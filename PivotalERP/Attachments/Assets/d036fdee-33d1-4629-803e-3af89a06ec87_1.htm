<script src="/jslib/AssetsManagement/AssetsDamage.js"></script>
<div id="ActionDiv" ng-app="myApp" ng-controller="AssetDamageController" ng-init="LoadData()">
    <div class="content">
        <div class="container-fluid">
            <div class="card">
                <div class="card-header p-0 border-bottom-0">
                    <ul class="nav nav-tabs" id="custom-tabs-four-tab" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="custom-tabs-four-home-tab" data-toggle="pill" href="#custom-tabs-four-home" role="tab" aria-controls="custom-tabs-four-home" aria-selected="true"> List</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="custom-tabs-four-profile-tab" data-toggle="pill" href="#custom-tabs-four-profile" role="tab" aria-controls="custom-tabs-four-profile" aria-selected="false" ng-click="ClearFields()">Asset Damage</a>
                        </li>
                    </ul>
                </div>
                <div class="card-body p-2">
                    <div class="tab-content" id="custom-tabs-four-tabContent">
                        <div class="tab-pane fade show active" id="custom-tabs-four-home" role="tabpanel" aria-labelledby="custom-tabs-four-home-tab">
                            <header class="row">
                                <div class="col-md-8">
                                    <div class="clearfix">
                                        <form class="form-inline">

                                            <div class="input-group input-group-sm">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text cstm">Show</span>
                                                </div>
                                                <select class="form-control border-left-0 border-right-0 pr-0" ng-model="perPage.AssetDamage">
                                                    <option ng-value="pp.value" ng-repeat="pp in perPageColl" ng-selected="">{{pp.text}}</option>
                                                </select>
                                                <div class="input-group-append">
                                                    <span class="input-group-text bg-white"><small>entries</small></span>
                                                </div>
                                            </div>
                                            <div class="input-group input-group-sm table-search-filed">
                                                <input class="form-control form-control-navbar" type="search"
                                                       placeholder="Search" aria-label="Search" ng-model="searchData.AssetDamage">
                                                <div class="input-group-append">
                                                    <button class="btn btn-default border-left-0" type="submit">
                                                        <i class="fas fa-search"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                                <div class="col-md-4 text-right">
                                    <div class="dropdown dnld-file"
                                         data-placement="top" title="Download File">
                                        <a class="btn btn-secondary btn-light btn-sm wait"
                                           title="Refresh" ng-click="GetAllAssetDamage()">
                                            <i class="fas fa-sync-alt"></i>
                                        </a>
                                        <button class="btn btn-secondary btn-light btn-sm dropdown-toggle" type="button"
                                                id="dropdownMenuButton" data-toggle="dropdown"
                                                aria-haspopup="true" aria-expanded="false">
                                            <i class="fas fa-download"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-right"
                                             aria-labelledby="dropdownMenuButton">
                                            <span class="dropdown-item">Choose an option:</span>
                                            <a class="dropdown-item wait" export-excel table-id="'#datatable'" sheet-name="'AssetDamage'" report-name="'List of Asset Damage'" ignore-column="'3'"><img src="/wwwroot/dynamic-erp/images/flaticons/excel.png" class="img-fluid exports-icon" alt="Excel image"> Excel</a>
                                            <a class="dropdown-item wait" onClick="$('#datatable').tableExport({type:'csv',escape:'false',reportName:'AssetDamage',ignoreColumn:'3' });"><img src="/wwwroot/dynamic-erp/images/flaticons/csv.png" class="img-fluid exports-icon" alt="Excel image"> CSV</a>
                                        </div>
                                        <a print-tbl report-name="'Asset Damage'" table-id="'#datatable'" class="btn btn-secondary btn-light btn-sm wait"
                                           title="Print">
                                            <i class="fas fa-print"></i>
                                        </a>
                                    </div>
                                </div>
                            </header>

                            <div class="search-toolbar mb-3 mt-2">
                                <table cellpadding="12" class="main-table table table-bordered table-striped table-hover table-sm" id="datatable">
                                    <thead>
                                        <tr>
                                            <th>S.NO</th>
                                            <th>Return No</th>
                                            <th>Date</th>
                                            <th>Branch</th>
                                            <th style="text-align:center" class="no-print " width="10%">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr dir-paginate="beData in AssetDamageList | filter:searchData.AssetDamage| itemsPerPage:perPage.AssetDamage" current-page="currentPages.AssetDamage" pagination-id="AssetDamagePagination">
                                            <td>{{$index+1}}</td>
                                            <td>{{beData.ReturnNo}}</td>
                                            <td>{{beData.DamageDate}}</td>
                                            <td>{{beData.BranchId}}</td>
                                            <td class="project-actions no-print text-center">
                                                <div class="btn-group-sm">
                                                    <a href="#" class="btn btn-info" ng-click="GetAssetdamageById(beData)"><i class="fas fa-pencil-alt"></i></a>
                                                    <a href="#" class="btn btn-danger" ng-click="DelAssetdamage(beData, $index)"><i class="fas fa-trash"></i></a>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>

                                </table>
                                <div class="col-md-12">
                                    <dir-pagination-controls pagination-id="AssetDamagePagination" boundary-links="true" on-page-change="pageChangeHandler(newPageNumber)" template-url="/Scripts/dirPagination.tpl.html">
                                    </dir-pagination-controls>
                                </div>
                            </div>

                        </div>

                        <div class="tab-pane fade" id="custom-tabs-four-profile" role="tabpanel" aria-labelledby="custom-tabs-four-profile-tab">
                            <div>
                                <form>
                                    <div class="row">

                                        <div class="col-3">
                                            <div class="form-group">
                                                <label>Asset Return No</label>
                                                <input type="text" class="form-control form-control-sm" ng-model="newAssetDamage.ReturnNo">
                                            </div>
                                        </div>
                                        
                                        <div class="col-3">
                                            <div class="form-group">
                                                <label>Asset Return Date</label>
                                                <input type="text" class="form-control form-control-sm" date-picker ng-model="newAssetDamage.DamageDate_TMP" date-detail="newAssetDamage.DamageDateDet">
                                            </div>
                                        </div>
                                        <div class="col-3">
                                            <div class="form-group">
                                                <label>Branch</label>
                                                <select class="form-control form-control-sm form-select select2" style="width: 100%;" ng-model="newAssetDamage.BranchId">
                                                    <option ng-value="G.id" ng-repeat="G in BranchList" ng-selected="G.id == newAssetDamage.BranchId">{{ G.text}}</option>
                                                </select>
                                            </div>
                                        </div>
                                     
                                        <div class="col-md-12">
                                            <div class="table-responsive pt-3">
                                                <table id="main-table" class="main-table table table-sm table-bordered bg-white">
                                                    <thead>
                                                        <tr>
                                                            <th style="width: 30px">S.No.</th>
                                                            <th style="width: 150px">Particlulars</th>
                                                            <th style="width: 60px">QTY</th>
                                                            <th style="width: 150px"> Status</th>
                                                            <th style="width: 50px">Action</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        <tr ng-repeat="PDet in newAssetDamage.AssetdamageDetailsColl">
                                                            <td>{{$index+1}}</td>
                                                            <td style="text-align:center;">
                                                                <select class="form-control form-control-sm form-select select2" style="width: 100%;" ng-model="pDet.ParticularId">
                                                                    <option ng-value="G.id" ng-repeat="G in ParticularList" ng-selected="G.id == pDet.ParticularId">{{ G.text}}</option>
                                                                </select>
                                                            </td>
                                                            <td><input type="text" class="form-control form-control-sm" ng-model="PDet.Qty" /></td>
                                                            <td style="text-align:center;">
                                                                <select class="form-control form-control-sm form-select " style="width: 100%;" ng-model="pDet.StatusId">
                                                                    <option ng-value="S.id" ng-repeat="S in StatusColl" ng-selected="S.id == pDet.StatusId">{{ S.text}}</option>
                                                                </select>
                                                            </td>
                                                            <td>
                                                                <a class="p-1" ng-click="Add($index)">
                                                                    <i class="fas fa-plus text-secondary"></i>
                                                                </a>
                                                                <a class="p-1" ng-click="Delete($index)">
                                                                    <i class="fas fa-trash-alt text-danger"></i>
                                                                </a>
                                                            </td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>

                                        </div>

                                        <div class="col-9">
                                            <div class="form-group">
                                                <label>Remarks/Notes</label>
                                                <textarea type="text" class="form-control form-control-sm" ng-model="newAssetDamage.Remarks"></textarea>
                                            </div>
                                        </div>


                                    </div>
                                </form>
                                <footer class="main-footer">
                                    <div class="text-right control-btns">
                                        <button type="button" class="btn btn-default btn" ng-click="ClearFields()"> <span class="glyphicon glyphicon-remove"></span>Clear</button>
                                        <button type="button" class="btn btn-primary btn" ng-click="SaveUpdateAssetDamage()"><span class="glyphicon glyphicon-save"></span>{{newAssetDamage.Mode}}</button>
                                    </div>
                                </footer>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
